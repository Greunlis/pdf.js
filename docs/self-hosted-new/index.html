    pdfJsScript.src = 'vendor/pdf.min.js';
    pdfJsScript.nonce = cspNonce;
    pdfJsScript.onload = () => {

  viewer.style.alignItems = "center";
  viewer.style.display = "flex";
  viewer.style.flexDirection = "column";
  viewer.style.gap = "16px";
  document.body.append(viewer);

  status.textContent = "Loading PDF...";
  viewer.append(status);

  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = ${JSON.stringify(pdfWorkerSrc)};

    const response = await fetch(pdfDataUri);
    const pdfData = await response.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;

    status.remove();

    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.5 });
      const outputScale = window.devicePixelRatio || 1;
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.style.boxShadow = "0 2px 8px rgba(0, 0, 0, 0.25)";

      canvas.style.height = Math.floor(viewport.height) + "px";
      viewer.append(canvas);

      const transform =
        outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

      await page.render({
        canvasContext: context,
        transform,
        viewport,
      }).promise;
    }
  } catch (error) {
    console.error(error);
    status.textContent = "Failed to load PDF: " + error.message;
    status.style.color = "#b00020";
  }
